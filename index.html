<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>随物宛转</title>
    <style>
        /* 引入更优雅的宋体字族，增加字体的纤细感与高级感 */
        body { 
            margin: 0; 
            background-color: #000; 
            color: #fff; 
            overflow: hidden; 
            font-family: "Noto Serif SC", "Songti SC", "STSong", "FZFangSong-Z02S", "SimSun", serif; 
            display: flex;
            height: 100vh;
            width: 100vw;
            -webkit-font-smoothing: antialiased; /* 让字体在苹果设备上更柔和 */
        }

        /* ================== 禅意变色粒子加载屏 ================== */
        #loading-screen {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 2s ease-in-out;
            overflow: hidden;
        }

        #loading-particles {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .zen-loader {
            position: relative;
            width: 80px;
            height: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 50px;
            z-index: 2; 
        }

        .zen-loader .ring-outer {
            position: absolute;
            width: 100%; height: 100%;
            border-radius: 50%;
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-top: 1px solid rgba(212, 175, 55, 0.6);
            animation: spin 8s linear infinite;
        }

        .zen-loader .ring-inner {
            position: absolute;
            width: 60%; height: 60%;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom-color: rgba(255, 255, 255, 0.5);
            animation: spin-reverse 12s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        .zen-loader .core {
            width: 6px; height: 6px;
            background-color: #d4af37;
            border-radius: 50%;
            box-shadow: 0 0 15px #d4af37, 0 0 30px #d4af37;
            animation: breathe 3s ease-in-out infinite alternate;
        }

        #loading-progress {
            font-family: 'Courier New', Courier, monospace; 
            font-size: 13px;
            color: rgba(212, 175, 55, 0.6);
            letter-spacing: 8px;
            font-weight: 300;
            z-index: 2;
            animation: pulse-text 2s infinite alternate;
            margin-left: 8px; /* 补偿 letter-spacing 造成的视觉偏移 */
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes spin-reverse { 100% { transform: rotate(-360deg); } }
        @keyframes breathe {
            0% { transform: scale(0.8); opacity: 0.3; filter: hue-rotate(0deg); }
            100% { transform: scale(1.2); opacity: 1; filter: hue-rotate(20deg); box-shadow: 0 0 25px #fff, 0 0 45px #d4af37; }
        }
        @keyframes pulse-text {
            0% { opacity: 0.3; }
            100% { opacity: 0.9; text-shadow: 0 0 15px rgba(212, 175, 55, 0.4); }
        }

        /* ================== 主画布与 UI 层 ================== */
        #main-canvas-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }

        #ui-layer {
            position: relative;
            width: 100%; height: 100%;
            display: flex;
            z-index: 10;
            pointer-events: none; 
            opacity: 0; 
            transition: opacity 3s ease-in-out;
            /* 增加极其微妙的暗角，让文字UI与3D场景剥离，增加纵深感 */
            background: radial-gradient(circle at 50% 50%, transparent 40%, rgba(0,0,0,0.6) 100%);
        }

        #left-zone { flex: 1.2; }
        
        #right-zone { 
            flex: 0.8; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            pointer-events: auto; 
        }

        /* 优雅的菜单网格设计 */
        .menu { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 25px 60px; 
            text-align: center; 
            padding-right: 5vw;
        }

        .menu a { 
            position: relative;
            color: rgba(255, 255, 255, 0.5); 
            text-decoration: none; 
            font-size: 1.8rem; 
            padding: 15px 20px;
            display: block; 
            letter-spacing: 6px; 
            font-weight: 300;
            /* 柔和的动画过渡 */
            transition: all 0.7s cubic-bezier(0.165, 0.84, 0.44, 1); 
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* 悬停时的“呼吸感”特效：字间距微微舒展，颜色点亮，轻微上浮 */
        .menu a:hover { 
            color: #d4af37; 
            letter-spacing: 12px; 
            border-bottom: 1px solid rgba(212, 175, 55, 0.4);
            transform: translateY(-3px); 
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.5); 
            background: linear-gradient(to top, rgba(212,175,55,0.05) 0%, transparent 50%);
        }

        #footer {
            position: fixed; bottom: 30px; width: 100%; text-align: center;
            color: rgba(255, 255, 255, 0.3); font-size: 12px; letter-spacing: 12px; 
            pointer-events: none; z-index: 100; opacity: 0; transition: opacity 3s ease-in-out;
            font-weight: 300;
            margin-left: 6px;
        }

        /* ================== 移动端美化排版 (大师级适配) ================== */
        @media screen and (max-width: 768px) {
            #ui-layer { 
                flex-direction: column; /* 改为垂直排布 */
                justify-content: flex-end; /* 将 UI 压到屏幕下方，避开上方的 3D 模型 */
                padding-bottom: 15vh; /* 距离底部留白 */
                background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 60%); /* 底部文字防挡遮罩 */
            }
            #left-zone { display: none; /* 手机端不需要左侧占位区，3D本身就在中上 */ } 
            
            #right-zone { 
                flex: none; 
                width: 100%; 
                justify-content: center; 
                padding: 0; 
            }

            .menu { 
                grid-template-columns: repeat(5, 1fr); /* 手机端改为一行5个，或两行交错 */
                gap: 15px 10px; 
                width: 90%;
                padding-right: 0;
            }

            .menu a { 
                font-size: 1.3rem; 
                padding: 10px 0; 
                letter-spacing: 2px;
                border-bottom: none; /* 手机端去掉下划线，保持极简 */
                color: rgba(255, 255, 255, 0.65);
            }

            /* 手机端触摸反馈 */
            .menu a:active {
                color: #d4af37;
                text-shadow: 0 0 10px rgba(212, 175, 55, 0.8);
                transform: scale(0.95);
            }

            #footer { bottom: 20px; font-size: 10px; letter-spacing: 8px; color: rgba(255, 255, 255, 0.2); }
        }
    </style>
</head>
<body>

    <!-- 带有变色粒子的加载屏 -->
    <div id="loading-screen">
        <canvas id="loading-particles"></canvas>
        <div class="zen-loader">
            <div class="ring-outer"></div>
            <div class="ring-inner"></div>
            <div class="core"></div>
        </div>
        <div id="loading-progress">0%</div>
    </div>

    <!-- 3D 背景 -->
    <div id="main-canvas-container"></div>

    <!-- UI 层 -->
    <div id="ui-layer">
        <div id="left-zone"></div>
        <div id="right-zone">
            <div class="menu">
                <a href="view.html?id=1">一</a> <a href="view.html?id=6">六</a>
                <a href="view.html?id=2">二</a> <a href="view.html?id=7">七</a>
                <a href="view.html?id=3">三</a> <a href="view.html?id=8">八</a>
                <a href="view.html?id=4">四</a> <a href="view.html?id=9">九</a>
                <a href="view.html?id=5">五</a> 
            </div>
        </div>
    </div>

    <!-- 底部 -->
    <div id="footer">--</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PLYLoader } from 'three/addons/loaders/PLYLoader.js';

        let scene, camera, renderer;
        let textPoints, buddhaPoints;
        let textMaterial, buddhaMaterial;
        let modelOpacityTarget = 0;
        let textOpacityTarget = 0;

        // --- 加载界面的变色粒子系统 ---
        let particleAnimId;
        function initLoadingParticles() {
            const canvas = document.getElementById('loading-particles');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const particles = [];
            for(let i = 0; i < 80; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    radius: Math.random() * 2 + 0.5,
                    vx: (Math.random() - 0.5) * 0.5,
                    vy: Math.random() * -1 - 0.2, 
                    hue: 40 + Math.random() * 20, 
                    life: Math.random()
                });
            }

            let time = 0;
            function animateParticles() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                time += 0.01;

                particles.forEach(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.life += 0.01;

                    if(p.y < 0) { p.y = canvas.height; p.x = Math.random() * canvas.width; }
                    
                    const currentHue = (p.hue + Math.sin(time + p.life) * 30) % 360;
                    const alpha = Math.abs(Math.sin(p.life * Math.PI)); 

                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.fillStyle = `hsla(${currentHue}, 70%, 60%, ${alpha})`;
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = `hsla(${currentHue}, 70%, 50%, ${alpha})`;
                    ctx.fill();
                });

                particleAnimId = requestAnimationFrame(animateParticles);
            }
            animateParticles();
        }
        initLoadingParticles();

        init();

        function init() {
            const container = document.getElementById('main-canvas-container');
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5)); 
            container.appendChild(renderer.domElement);

            createTextParticles();
            loadRandomCenterModel(); 
            render();
        }

        function createTextParticles() {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 1000; canvas.height = 1000;
            ctx.fillStyle = "#fff";
            ctx.font = "140px 'Songti SC', 'STSong', serif"; 
            ctx.textAlign = "center";
            
            const startY = 250;
            const spacing = 180;
            ctx.fillText("随", 500, startY);
            ctx.fillText("物", 500, startY + spacing);
            ctx.fillText("宛", 500, startY + spacing * 2);
            ctx.fillText("转", 500, startY + spacing * 3);

            const imageData = ctx.getImageData(0, 0, 1000, 1000);
            const positions =[];
            const step = 3;

            for (let y = 0; y < 1000; y += step) {
                for (let x = 0; x < 1000; x += step) {
                    const alpha = imageData.data[(y * 1000 + x) * 4 + 3];
                    if (alpha > 128) {
                        const jitter = 0.08; 
                        positions.push(
                            (x - 500) * 0.009 + (Math.random() - 0.5) * jitter, 
                            (550 - y) * 0.009 + (Math.random() - 0.5) * jitter, 
                            (Math.random() - 0.5) * 0.1
                        );
                    }
                }
            }

            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            
            textMaterial = new THREE.PointsMaterial({ color: 0xd4af37, size: 0.035, transparent: true, opacity: 0, blending: THREE.AdditiveBlending });
            textPoints = new THREE.Points(geo, textMaterial);
            scene.add(textPoints);
        }

        function loadRandomCenterModel() {
            const randomId = Math.floor(Math.random() * 4) + 1; 
            const loader = new PLYLoader();
            
            loader.load(`./${randomId}.ply`, 
                (geometry) => {
                    document.getElementById('loading-progress').innerText = '100%';
                    
                    setTimeout(() => {
                        geometry.center();
                        const box = new THREE.Box3().setFromObject(new THREE.Points(geometry));
                        const size = box.getSize(new THREE.Vector3());
                        const maxDim = Math.max(size.x, size.y, size.z);
                        const targetScale = 6 / maxDim; 

                        buddhaMaterial = new THREE.PointsMaterial({
                            color: 0xd4af37, size: 0.015, transparent: true, opacity: 0, blending: THREE.AdditiveBlending
                        });

                        buddhaPoints = new THREE.Points(geometry, buddhaMaterial);
                        buddhaPoints.userData.baseScale = targetScale; 
                        buddhaPoints.rotation.x = Math.PI; 
                        
                        scene.add(buddhaPoints);
                        updateResponsiveLayout(); 
                        
                        const loadingScreen = document.getElementById('loading-screen');
                        loadingScreen.style.opacity = '0';
                        setTimeout(() => { 
                            loadingScreen.style.display = 'none'; 
                            cancelAnimationFrame(particleAnimId); 
                        }, 1500);

                        setTimeout(() => { modelOpacityTarget = 0.85; }, 500);

                        setTimeout(() => {
                            textOpacityTarget = 0.9;
                            document.getElementById('ui-layer').style.opacity = '1';
                            document.getElementById('footer').style.opacity = '1';
                        }, 2000);

                        safePreloadModels(randomId);

                    }, 200);
                },
                (xhr) => {
                    if (xhr.lengthComputable) {
                        const percent = Math.round((xhr.loaded / xhr.total) * 100);
                        document.getElementById('loading-progress').innerText = percent + '%';
                    } else {
                        const mb = (xhr.loaded / (1024 * 1024)).toFixed(1);
                        document.getElementById('loading-progress').innerText = `${mb}MB`;
                    }
                },
                (error) => {
                    console.error('模型加载失败:', error);
                    document.getElementById('loading-progress').innerHTML = `<span style="color:#ff4444">ERR</span>`;
                }
            );
        }

        async function safePreloadModels(excludeId) {
            await new Promise(r => setTimeout(r, 5000));
            const preloadList = [1, 2, 3, 4, 6, 7, 8, 9];
            
            for (let i of preloadList) {
                if (i === excludeId) continue;
                try {
                    await new Promise(r => setTimeout(r, 1500));
                    await fetch(`./${i}.ply`);
                } catch(e) {}
            }
        }

        function updateResponsiveLayout() {
            const aspect = window.innerWidth / window.innerHeight;
            if (aspect < 1) { 
                // ========== 这里是为你重新调好的手机端无重叠坐标 ==========
                camera.position.z = 24; 
                if (textPoints) { textPoints.position.set(-3.5, 5, 0); textPoints.scale.set(1.2, 1.2, 1.2); }
                if (buddhaPoints) { buddhaPoints.position.set(0, 7, 0); buddhaPoints.scale.setScalar(buddhaPoints.userData.baseScale * 1.1); }
            } else { 
                camera.position.z = 10; 
                if (textPoints) { textPoints.position.set(-5, 0, 0); textPoints.scale.set(1, 1, 1); }
                if (buddhaPoints) { buddhaPoints.position.set(0, 0, 0); buddhaPoints.scale.setScalar(buddhaPoints.userData.baseScale); }
            }
        }

        function render() {
            if (buddhaPoints) { buddhaPoints.rotation.y += 0.003; } 
            if (buddhaMaterial && buddhaMaterial.opacity < modelOpacityTarget) { buddhaMaterial.opacity += 0.005; }
            if (textMaterial && textMaterial.opacity < textOpacityTarget) { textMaterial.opacity += 0.005; }
            renderer.render(scene, camera);
            requestAnimationFrame(render);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            const loadCanvas = document.getElementById('loading-particles');
            if(loadCanvas) { loadCanvas.width = window.innerWidth; loadCanvas.height = window.innerHeight; }
            updateResponsiveLayout();
        });
    </script>
</body>
</html>
