<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>随物宛转 - 曾文翔</title>
    <style>
        /* 引入优雅的宋体作为全局字体 */
        body { 
            margin: 0; 
            background-color: #000; 
            color: #fff; 
            overflow: hidden; 
            font-family: "Songti SC", "STSong", "SimSun", "Noto Serif CJK SC", serif; 
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* ================== 加载动画层 ================== */
        #loading-screen {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 1.5s ease-in-out;
        }

        .loading-text {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        .loading-text span {
            font-size: 26px;
            color: #fff;
            letter-spacing: 8px;
            opacity: 0;
            transform: translateY(10px);
            animation: appear 0.8s forwards, bob 2.5s infinite ease-in-out alternate;
        }

        #loading-progress {
            font-size: 14px;
            color: #d4af37;
            margin-top: 20px;
            font-family: Arial, sans-serif;
            letter-spacing: 4px;
            opacity: 0.8;
            height: 20px;
        }

        @keyframes appear { to { opacity: 1; transform: translateY(0); } }
        @keyframes bob {
            0% { transform: translateY(0); color: #666; text-shadow: none; }
            100% { transform: translateY(-8px); color: #ffd700; text-shadow: 0 0 15px rgba(255, 215, 0, 0.4); }
        }

        .loading-text span:nth-child(1) { animation-delay: 0.0s, 0.5s; }
        .loading-text span:nth-child(2) { animation-delay: 0.2s, 0.7s; }
        .loading-text span:nth-child(3) { animation-delay: 0.4s, 0.9s; }
        .loading-text span:nth-child(4) { animation-delay: 0.6s, 1.1s; }

        /* ================== 3D 画布 ================== */
        #main-canvas-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }

        /* ================== UI 交互层 ================== */
        #ui-layer {
            position: relative;
            width: 100%; height: 100%;
            display: flex;
            z-index: 10;
            pointer-events: none; 
            opacity: 0; 
            transition: opacity 3s ease-in-out;
        }

        #left-zone { flex: 1.2; }
        #right-zone { 
            flex: 0.8; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            pointer-events: auto; 
        }

        /* 电脑端菜单排版 */
        .menu { 
            display: grid; 
            grid-template-columns: repeat(2, 140px);
            grid-template-rows: repeat(5, 1fr);
            gap: 40px 60px; 
            text-align: center;
        }

        .menu a { 
            color: #aaa; 
            text-decoration: none; 
            font-size: 2.8rem; 
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            display: block;
            letter-spacing: 5px;
        }

        .menu a:hover { color: #ffd700; transform: scale(1.15); text-shadow: 0 0 15px rgba(255,215,0,0.6); }

        /* 底部署名 */
        #footer {
            position: fixed;
            bottom: 40px;
            width: 100%;
            text-align: center;
            color: #555;
            font-size: 18px;
            letter-spacing: 15px;
            pointer-events: none;
            z-index: 100;
            opacity: 0; 
            transition: opacity 3s ease-in-out;
        }

        /* ================== 移动端极致美化排版 ================== */
        @media screen and (max-width: 768px) {
            #ui-layer {
                flex-direction: row; 
                align-items: center; /* 让数字菜单垂直居中 */
                padding-top: 20%; /* 整体稍微往下压一点，避开上面的佛像 */
            }
            #left-zone { flex: 1; display: block; } /* 左边留空给3D文字 */
            #right-zone { 
                flex: 1; 
                justify-content: flex-end; 
                padding-right: 40px; /* 数字距离右侧屏幕边缘的距离 */
            }
            
            .menu { 
                grid-template-columns: repeat(2, 60px); 
                gap: 40px 30px; /* 加大数字上下的间距，呼吸感更强 */
            }
            
            .menu a { 
                font-size: 2rem; /* 增大手机端数字字体 */
                color: #ccc; 
            }
            
            #footer { 
                bottom: 30px; /* 署名贴底 */
                font-size: 12px; 
                letter-spacing: 8px; 
                color: #444; /* 颜色再暗一点，不抢戏 */
            }
        }
    </style>
</head>
<body>

    <!-- 加载动画 -->
    <div id="loading-screen">
        <div class="loading-text" id="loading-container">
            <span>正</span>
            <span>在</span>
            <span>连</span>
            <span>接</span>
            <div id="loading-progress">...</div>
        </div>
    </div>

    <!-- 3D 背景 -->
    <div id="main-canvas-container"></div>

    <!-- UI 层 -->
    <div id="ui-layer">
        <div id="left-zone"></div>
        <div id="right-zone">
            <div class="menu">
                <a href="view.html?id=1">一</a> <a href="view.html?id=6">六</a>
                <a href="view.html?id=2">二</a> <a href="view.html?id=7">七</a>
                <a href="view.html?id=3">三</a> <a href="view.html?id=8">八</a>
                <a href="view.html?id=4">四</a> <a href="view.html?id=9">九</a>
                <a href="view.html?id=5">五</a> 
            </div>
        </div>
    </div>

    <!-- 底部 -->
    <div id="footer">23 影像 曾文翔</div>

    <!-- 优化后的高速 CDN -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/r160/three.module.min.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PLYLoader } from 'three/addons/loaders/PLYLoader.js';

        let scene, camera, renderer;
        let textPoints, buddhaPoints;
        let textMaterial, buddhaMaterial;
        
        let modelOpacityTarget = 0;
        let textOpacityTarget = 0;

        init();

        function init() {
            const container = document.getElementById('main-canvas-container');
            scene = new THREE.Scene();
            
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            // 限制像素比，极大提升手机端渲染帧率
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5)); 
            container.appendChild(renderer.domElement);

            createTextParticles();
            loadRandomCenterModel(); 

            render();
        }

        function createTextParticles() {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 1000; canvas.height = 1000;
            ctx.fillStyle = "#fff";
            ctx.font = "140px 'Songti SC', 'STSong', serif"; /* 强制使用宋体渲染 */
            ctx.textAlign = "center";
            
            const startY = 250;
            const spacing = 180;
            ctx.fillText("随", 500, startY);
            ctx.fillText("物", 500, startY + spacing);
            ctx.fillText("宛", 500, startY + spacing * 2);
            ctx.fillText("转", 500, startY + spacing * 3);

            const imageData = ctx.getImageData(0, 0, 1000, 1000);
            const positions =[];
            const step = 3;

            for (let y = 0; y < 1000; y += step) {
                for (let x = 0; x < 1000; x += step) {
                    const alpha = imageData.data[(y * 1000 + x) * 4 + 3];
                    if (alpha > 128) {
                        const jitter = 0.08; 
                        positions.push(
                            (x - 500) * 0.009 + (Math.random() - 0.5) * jitter, 
                            (550 - y) * 0.009 + (Math.random() - 0.5) * jitter, 
                            (Math.random() - 0.5) * 0.1
                        );
                    }
                }
            }

            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            
            textMaterial = new THREE.PointsMaterial({ 
                color: 0xd4af37, size: 0.035, transparent: true, opacity: 0, blending: THREE.AdditiveBlending 
            });
            textPoints = new THREE.Points(geo, textMaterial);
            scene.add(textPoints);
        }

        function loadRandomCenterModel() {
            // 随机加载 1-4 号模型作为背景（假设你已压缩它们）
            const randomId = Math.floor(Math.random() * 4) + 1; 
            const loader = new PLYLoader();
            
            // 【注意】这里加了 /models/ 路径，确保能读到文件
            loader.load(`./models/${randomId}.ply`, 
                (geometry) => {
                    document.getElementById('loading-progress').innerText = '即将展现...';
                    
                    setTimeout(() => {
                        geometry.center();
                        const box = new THREE.Box3().setFromObject(new THREE.Points(geometry));
                        const size = box.getSize(new THREE.Vector3());
                        const maxDim = Math.max(size.x, size.y, size.z);
                        const targetScale = 6 / maxDim; 

                        buddhaMaterial = new THREE.PointsMaterial({
                            color: 0xd4af37, size: 0.015, transparent: true, opacity: 0, blending: THREE.AdditiveBlending
                        });

                        buddhaPoints = new THREE.Points(geometry, buddhaMaterial);
                        buddhaPoints.userData.baseScale = targetScale; 
                        buddhaPoints.rotation.x = Math.PI; 
                        
                        scene.add(buddhaPoints);
                        updateResponsiveLayout(); 
                        
                        // 优雅淡出加载屏
                        const loadingScreen = document.getElementById('loading-screen');
                        loadingScreen.style.opacity = '0';
                        setTimeout(() => { loadingScreen.style.display = 'none'; }, 1500);

                        // 佛像先亮起
                        setTimeout(() => { modelOpacityTarget = 0.8; }, 500);

                        // UI和文字最后亮起，制造层次感
                        setTimeout(() => {
                            textOpacityTarget = 0.9;
                            document.getElementById('ui-layer').style.opacity = '1';
                            document.getElementById('footer').style.opacity = '1';
                        }, 2000);

                    }, 200);
                },
                (xhr) => {
                    if (xhr.lengthComputable) {
                        const percent = Math.round((xhr.loaded / xhr.total) * 100);
                        document.getElementById('loading-progress').innerText = percent + '%';
                    } else {
                        const mb = (xhr.loaded / (1024 * 1024)).toFixed(1);
                        document.getElementById('loading-progress').innerText = `已读取 ${mb} MB`;
                    }
                },
                (error) => {
                    console.error('模型加载失败:', error);
                    document.getElementById('loading-progress').innerHTML = `<span style="color:#ff6b6b">云端连接失败，请刷新页面</span>`;
                }
            );
        }

        function updateResponsiveLayout() {
            const aspect = window.innerWidth / window.innerHeight;
            
            if (aspect < 1) { 
                // ================= 手机端排版重构 =================
                camera.position.z = 24; 
                if (textPoints) {
                    // 把“随物宛转”往上提，并放大 1.4倍！视觉效果更震撼
                    textPoints.position.set(-6, 2, 0); 
                    textPoints.scale.set(1.4, 1.4, 1.4); 
                }
                if (buddhaPoints) {
                    // 佛像往上提一点，避开中间的文字菜单
                    buddhaPoints.position.set(0, 4.5, 0); 
                    buddhaPoints.scale.setScalar(buddhaPoints.userData.baseScale * 1.1); 
                }
            } else { 
                // ================= 电脑端保持原样 =================
                camera.position.z = 10; 
                if (textPoints) {
                    textPoints.position.set(-5, 0, 0); 
                    textPoints.scale.set(1, 1, 1);
                }
                if (buddhaPoints) {
                    buddhaPoints.position.set(0, 0, 0); 
                    buddhaPoints.scale.setScalar(buddhaPoints.userData.baseScale);
                }
            }
        }

        function render() {
            if (buddhaPoints) { buddhaPoints.rotation.y += 0.003; } // 旋转放慢一点，更庄重
            
            // 呼吸淡入效果
            if (buddhaMaterial && buddhaMaterial.opacity < modelOpacityTarget) { buddhaMaterial.opacity += 0.005; }
            if (textMaterial && textMaterial.opacity < textOpacityTarget) { textMaterial.opacity += 0.005; }

            renderer.render(scene, camera);
            requestAnimationFrame(render);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            updateResponsiveLayout();
        });
    </script>
</body>
</html>
