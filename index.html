<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>随物宛转—23影像曾文翔</title>
    <style>
        body { 
            margin: 0; 
            background-color: #000; 
            color: #fff; 
            overflow: hidden; 
            font-family: "SimSun", "STSong", "Songti SC", serif; 
            display: flex;
            height: 100vh;
        }

        /* 加载过渡动画屏 */
        #loading-screen {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 1s ease-in-out;
        }

        .loading-text {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .loading-text span {
            font-size: 28px;
            color: #fff;
            letter-spacing: 5px;
            opacity: 0;
            transform: translateY(15px);
            /* 组合动画：1.出现 2.上下浮动 */
            animation: 
                appear 0.6s forwards,
                bob 2s infinite ease-in-out alternate;
        }

        @keyframes appear {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes bob {
            0% { transform: translateY(0); color: #888; text-shadow: none; }
            100% { transform: translateY(-12px); color: #ffd700; text-shadow: 0 0 15px rgba(255, 215, 0, 0.6); }
        }

        /* 依次延迟触发每个字的动画 */
        .loading-text span:nth-child(1) { animation-delay: 0.0s, 0.5s; }
        .loading-text span:nth-child(2) { animation-delay: 0.3s, 0.8s; }
        .loading-text span:nth-child(3) { animation-delay: 0.6s, 1.1s; }
        .loading-text span:nth-child(4) { animation-delay: 0.9s, 1.4s; }
        .loading-text span:nth-child(5) { animation-delay: 1.2s, 1.7s; }

        /* 3D全屏背景容器 */
        #main-canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        /* UI交互层（初始隐藏，等待动画触发） */
        #ui-layer {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            z-index: 10;
            pointer-events: none; 
            opacity: 0; /* 配合开场动画 */
            transition: opacity 2s ease-in-out;
        }

        #left-zone { flex: 1.2; }
        #right-zone { 
            flex: 0.8; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            pointer-events: auto; 
        }

        /* 数字菜单 */
        .menu { 
            display: grid; 
            grid-template-columns: repeat(2, 140px);
            grid-template-rows: repeat(5, 1fr);
            gap: 40px 60px; 
            text-align: center;
        }

        .menu a { 
            color: #aaa; 
            text-decoration: none; 
            font-size: 2.8rem; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            display: block;
            letter-spacing: 5px;
        }

        .menu a:hover { color: #ffd700; transform: scale(1.1); text-shadow: 0 0 10px rgba(255,215,0,0.5); }

        /* 底部署名 */
        #footer {
            position: fixed;
            bottom: 40px;
            width: 100%;
            text-align: center;
            color: #777;
            font-size: 20px;
            letter-spacing: 12px;
            pointer-events: none;
            z-index: 100;
            opacity: 0; /* 配合开场动画 */
            transition: opacity 2s ease-in-out;
        }

        /* ========== 手机端响应式适配 (左右排版，佛像在上方) ========== */
        @media screen and (max-width: 768px) {
            #ui-layer {
                flex-direction: row; /* 强制手机端也是左右排版 */
                align-items: flex-end; /* 菜单靠下放置，留出上方空间给佛像 */
                padding-bottom: 60px;
            }
            #left-zone { display: block; flex: 1; } /* 左侧占位 */
            #right-zone { flex: 1; justify-content: flex-end; padding-right: 30px; }
            
            .menu { 
                grid-template-columns: repeat(2, 60px); /* 极度压缩菜单间距 */
                gap: 20px 15px; 
            }
            .menu a { font-size: 1.6rem; letter-spacing: 2px; }
            
            #footer { bottom: 20px; font-size: 12px; letter-spacing: 4px; }
        }
    </style>
</head>
<body>

    <!-- 正在加载中 动画屏 -->
    <div id="loading-screen">
        <div class="loading-text">
            <span>正</span>
            <span>在</span>
            <span>加</span>
            <span>载</span>
            <span>中</span>
        </div>
    </div>

    <div id="main-canvas-container"></div>

    <div id="ui-layer">
        <div id="left-zone"></div>
        <div id="right-zone">
            <div class="menu">
                <a href="view.html?id=1">一</a> <a href="view.html?id=6">六</a>
                <a href="view.html?id=2">二</a> <a href="view.html?id=7">七</a>
                <a href="view.html?id=3">三</a> <a href="view.html?id=8">八</a>
                <a href="view.html?id=4">四</a> <a href="view.html?id=9">九</a>
                <a href="view.html?id=5">五</a> 
            </div>
        </div>
    </div>

    <div id="footer">23 影像 曾文翔</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PLYLoader } from 'three/addons/loaders/PLYLoader.js';

        let scene, camera, renderer;
        let textPoints, buddhaPoints;
        let textMaterial, buddhaMaterial;
        
        // 用于控制渐显的透明度目标值
        let modelOpacityTarget = 0;
        let textOpacityTarget = 0;

        init();

        function init() {
            const container = document.getElementById('main-canvas-container');
            scene = new THREE.Scene();
            
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); 
            container.appendChild(renderer.domElement);

            createTextParticles();
            loadRandomCenterModel(); // 改为加载随机1-4号模型

            render();
        }

        function createTextParticles() {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 1000; canvas.height = 1000;
            ctx.fillStyle = "#fff";
            ctx.font = "140px 'SimSun', 'STSong', serif";
            ctx.textAlign = "center";
            
            const startY = 250;
            const spacing = 180;
            ctx.fillText("随", 500, startY);
            ctx.fillText("物", 500, startY + spacing);
            ctx.fillText("宛", 500, startY + spacing * 2);
            ctx.fillText("转", 500, startY + spacing * 3);

            const imageData = ctx.getImageData(0, 0, 1000, 1000);
            const positions =[];
            const step = 3;

            for (let y = 0; y < 1000; y += step) {
                for (let x = 0; x < 1000; x += step) {
                    const alpha = imageData.data[(y * 1000 + x) * 4 + 3];
                    if (alpha > 128) {
                        const jitter = 0.08; 
                        positions.push(
                            (x - 500) * 0.009 + (Math.random() - 0.5) * jitter, 
                            (550 - y) * 0.009 + (Math.random() - 0.5) * jitter, 
                            (Math.random() - 0.5) * 0.1
                        );
                    }
                }
            }

            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            
            // 注意：材质透明度初始设为 0，等待加载完成后渐显
            textMaterial = new THREE.PointsMaterial({ 
                color: 0xd4af37, size: 0.035, transparent: true, opacity: 0, blending: THREE.AdditiveBlending 
            });
            textPoints = new THREE.Points(geo, textMaterial);
            scene.add(textPoints);
        }

        function loadRandomCenterModel() {
            // 随机挑选 1 到 4 号模型
            const randomId = Math.floor(Math.random() * 4) + 1;
            const loader = new PLYLoader();
            
            loader.load(`./${randomId}.ply`, 
                (geometry) => {
                    geometry.center();
                    
                    // 动态计算模型大小，确保无论抽到1-4哪个，大小都基本一致
                    const box = new THREE.Box3().setFromObject(new THREE.Points(geometry));
                    const size = box.getSize(new THREE.Vector3());
                    const maxDim = Math.max(size.x, size.y, size.z);
                    const targetScale = 6 / maxDim; // 统一归一化缩放比例

                    // 注意：材质透明度初始设为 0
                    buddhaMaterial = new THREE.PointsMaterial({
                        color: 0xd4af37, size: 0.015, transparent: true, opacity: 0, blending: THREE.AdditiveBlending
                    });

                    buddhaPoints = new THREE.Points(geometry, buddhaMaterial);
                    buddhaPoints.userData.baseScale = targetScale; // 保存基础缩放供响应式排版使用
                    buddhaPoints.rotation.x = Math.PI; 
                    
                    scene.add(buddhaPoints);
                    updateResponsiveLayout(); // 加载完进行排版
                    
                    // ==============================
                    // 核心逻辑：播放顺序出场动画
                    // ==============================
                    const loadingScreen = document.getElementById('loading-screen');
                    
                    // 1. 隐藏加载屏
                    loadingScreen.style.opacity = '0';
                    setTimeout(() => { loadingScreen.style.display = 'none'; }, 1000);

                    // 2. 佛像开始慢慢显现
                    setTimeout(() => { modelOpacityTarget = 0.9; }, 800);

                    // 3. 佛像出来一会后，慢慢显现粒子文字和UI菜单
                    setTimeout(() => {
                        textOpacityTarget = 0.9;
                        document.getElementById('ui-layer').style.opacity = '1';
                        document.getElementById('footer').style.opacity = '1';
                    }, 2800);

                    // 4. 后台静默预加载其他模型文件，加速后续点击体验
                    preloadOtherModels(randomId);
                },
                undefined,
                (error) => {
                    console.error('模型加载失败:', error);
                    alert("模型加载失败！请检查根目录下是否有 1.ply ~ 4.ply。");
                    document.getElementById('loading-screen').style.display = 'none';
                    document.getElementById('ui-layer').style.opacity = '1';
                    textOpacityTarget = 0.9;
                }
            );
        }

        // 后台静默预加载函数（利用浏览器缓存）
        function preloadOtherModels(excludeId) {
            for (let i = 1; i <= 9; i++) {
                if (i === excludeId || i === 5) continue; // 5号太大了尽量不预加载
                fetch(`./${i}.ply`, { priority: 'low' }).catch(()=>{});
            }
        }

        // 核心：响应式 3D 布局
        function updateResponsiveLayout() {
            const aspect = window.innerWidth / window.innerHeight;
            
            if (aspect < 1) { 
                // ======= 手机端竖屏 (保持左右排版) =======
                camera.position.z = 18; 
                if (textPoints) {
                    // 粒子字挪到左边偏下，配合右侧菜单
                    textPoints.position.set(-3.5, -2, 0); 
                    textPoints.scale.set(0.65, 0.65, 0.65); // 缩小字号
                }
                if (buddhaPoints) {
                    // 佛像挪到屏幕正中偏上方，不阻挡文字和菜单
                    buddhaPoints.position.set(0, 4.5, 0); 
                    buddhaPoints.scale.setScalar(buddhaPoints.userData.baseScale * 1.1); // 手机端稍微放大点模型
                }
            } else { 
                // ======= 电脑端横屏 =======
                camera.position.z = 10; 
                if (textPoints) {
                    textPoints.position.set(-5, 0, 0); 
                    textPoints.scale.set(1, 1, 1);
                }
                if (buddhaPoints) {
                    buddhaPoints.position.set(0, 0, 0); 
                    buddhaPoints.scale.setScalar(buddhaPoints.userData.baseScale);
                }
            }
        }

        function render() {
            // 佛像持续旋转
            if (buddhaPoints) {
                buddhaPoints.rotation.y += 0.005; 
            }
            
            // 处理佛像渐显平滑动画
            if (buddhaMaterial && buddhaMaterial.opacity < modelOpacityTarget) {
                buddhaMaterial.opacity += 0.005; 
            }
            
            // 处理粒子字渐显平滑动画
            if (textMaterial && textMaterial.opacity < textOpacityTarget) {
                textMaterial.opacity += 0.005; 
            }

            renderer.render(scene, camera);
            requestAnimationFrame(render);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            updateResponsiveLayout();
        });
    </script>
</body>
</html>
